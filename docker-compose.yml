# ── llm-kb Docker Compose ────────────────────────────────────────────────────
# Simple one-command deployment: docker compose up
# ─────────────────────────────────────────────────────────────────────────────

services:
  llm-kb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-kb
    ports:
      - "${LLM_KB_PORT:-3947}:3947"
    volumes:
      # Mount your documents folder here
      - ${DOCUMENTS_PATH:-./docs}:/data/documents
      # Persist Ollama models between container restarts
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - LLM_KB_PORT=3947
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3947/api/status"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  ollama-models:
    driver: local
